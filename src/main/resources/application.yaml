spring:
  application:
    name: Gestor_Salud

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
     hibernate:
      format_sql: true
  mail:
    host: localhost
    port: 1025

  jackson:
    json:
      read:
        allow-single-quotes: true
        allow-trailing-comma: true